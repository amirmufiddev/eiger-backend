version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: eiger_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eiger_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d eiger_db']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eiger_api
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/eiger_db
      BETTER_AUTH_SECRET: your-secret-key-here
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
